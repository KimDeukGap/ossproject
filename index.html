<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>AI 게임 맞추기</title>
</head>
<body>

    <header>
        <h1>GuessGame</h1>
        <div id="room-info">
            <span>라운드: 1/5</span>
        </div>
    </header>

    <hr>

    <main style="display: flex; gap: 20px;">

        <section id="game-display" style="flex-grow: 1; text-align: center;">
            <div id="timer" style="font-size: 24px; color: red;">남은 시간: 30초</div>
            
            <div id="question-area" style="height: 300px; background: #f0f0f0; margin: 20px 0; display: flex; align-items: center; justify-content: center;">
                <p>[ 여기에 이미지가 표시됩니다 ]</p>
            </div>

            <div id="answer-section">
                <input type="text" id="user-answer" placeholder="정답을 입력하세요!">
                <button type="button">전송</button>
            </div>
        </section>
    </main>

</body>
</html>
